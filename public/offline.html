<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - Kiosco App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    p {
      font-size: 16px;
      opacity: 0.8;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .retry-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .retry-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .tips {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 14px;
      opacity: 0.6;
    }

    .tips-title {
      font-weight: 600;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .tips-list {
      list-style: none;
      text-align: left;
      margin-top: 12px;
    }

    .tips-list li {
      padding: 8px 0;
      padding-left: 24px;
      position: relative;
    }

    .tips-list li:before {
      content: "•";
      position: absolute;
      left: 8px;
      color: #3b82f6;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>

    <h1>Sin Conexión a Internet</h1>
    <p>
      No pudimos conectarnos al servidor. Verifica tu conexión a internet e intenta nuevamente.
    </p>

    <button class="retry-btn" onclick="location.reload()">
      🔄 Reintentar
    </button>

    <div class="tips">
      <div class="tips-title">💡 Consejos</div>
      <ul class="tips-list">
        <li>Verifica que el Wi-Fi esté activado</li>
        <li>Comprueba tu plan de datos móviles</li>
        <li>Intenta moverte a una zona con mejor señal</li>
      </ul>
    </div>
  </div>

  <script>
    // Verificar conexión cada 5 segundos
    setInterval(() => {
      if (navigator.onLine) {
        location.reload();
      }
    }, 5000);

    // Evento cuando vuelve la conexión
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
