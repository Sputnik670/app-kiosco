name: Keep Supabase Alive

on:
  schedule:
    # Cada lunes a las 10 AM UTC (7 AM Argentina)
    - cron: '0 10 * * 1'
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase para evitar pausa
        run: |
          curl -X GET "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/productos?limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json"
      
      - name: Log success
        run: echo "✅ Supabase pinged successfully at $(date)"